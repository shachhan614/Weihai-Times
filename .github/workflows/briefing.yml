name: Weekly Weihai Business Briefing (Pro Edition)

on:
  schedule:
    # 01:30 UTC = 09:30 北京时间，每周一 (1)
    - cron: '30 1 * * 1'
  workflow_dispatch: 

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests openai markdown

      - name: Run Briefing Script
        env:
          # ==========================================
          # 1. 业务定制变量
          # ==========================================
          TARGET_COMPANIES: ${{ vars.TARGET_COMPANIES }}
          TARGET_INDUSTRY: ${{ vars.TARGET_INDUSTRY }}
          EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS }}
          
          # ==========================================
          # 2. 模型与搜索服务配置
          # ==========================================
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
          API_REQUEST_DELAY: '3.0'
          
          BOCHA_API_KEY: ${{ secrets.BOCHA_API_KEY }}
          
          # ==========================================
          # 3. 邮件发送配置
          # ==========================================
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          
        run: python main.py
